name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    # timeout-minutes intentionally removed to observe actual runtime after
    # the noiseLevels vignette's parallel sweeps were added -- it timed out
    # at the previous 30 min limit. Falls back to GitHub's own default
    # (360 min for hosted runners). Reinstate a specific value, set from the
    # observed time plus a generous buffer, once that's known.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
